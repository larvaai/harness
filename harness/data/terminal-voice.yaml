# terminal-voice.yaml — the harness's CONVERSATIONAL register in the terminal.
#
# These knobs shape ONLY what the assistant SAYS to you in the terminal — the
# surface prose. They never touch code, generated docs/reports, commit messages,
# evidence (file:line / IDs / SHAs / quotes), or any gate's allow/block decision;
# and they do NOT control an artifact's own designed voice (the journal-writer's
# brutal candor, the hs-think:critique neutral tone stay fixed at every voice_level).
# The scope-fence, the harshness ladder, and the universal-harm floor live in
# harness/rules/terminal-voice.md. Loader: harness/scripts/voice_prefs.py.
#
# ONE EXCEPTION lives in this file: `output_style` (bottom). It is NOT a terminal-voice
# knob — it deliberately shapes the DELIVERABLE (prose AND code) to the reader's coding
# expertise, so the scope-fence above does not apply to it. It is off by default.
#
# A missing key, out-of-range value, or typo silently falls back to its default
# (the loader never crashes). The /hs-meta:voice quick-switch may rewrite this file
# when you ask it to persist a choice (comments are not preserved on rewrite).

# terminal_voice_level: 0..5 (default 5) — explanation depth/format of terminal answers.
#   0 = answer only, no explanation … 5 = full reasoning, context, alternatives.
terminal_voice_level: 5

# persona: surface FORM of terminal prose (default none = natural harness voice).
#   `none` + the 13-style catalog in terminal-voice.md (work group default-eligible;
#   fun group opt-in). persona sets the FORM; voice_level sets the harshness inside.
persona: none

# voice_level: 1..9 (default 5) — harshness/bluntness register on the terminal.
#   1-4 = polite … 5 = blunt, direct, NO profanity (default) … 6-9 = escalating
#   roast / vi `mày-tao` / work-aimed profanity at 9. Reaching 6-9 is a deliberate
#   edit here (no per-run prompt). The universal-harm floor holds at EVERY level:
#   venom aimed at the WORK is allowed; anything aimed at WHO the user is is not.
voice_level: 5

# no_markdown: true|false (default false) — drop markdown formatting from terminal
#   answers (plain prose). Saves ~20-30% tokens on long answers.
no_markdown: false

# --- interview-rigor knobs (read by hs:plan / hs-research:discover / hs-think:brainstorm) ---
# These shape how the assistant INTERVIEWS you, not what it builds.

# interview_rigor: light | standard | deep (default standard) — depth of challenge.
#   How hard the assistant probes claims, gaps, edge-cases, acceptance-criteria
#   holes. Depth of challenge, SEPARATE from verbosity ("concise but deep" is valid).
interview_rigor: standard

# action_prompting: minimal | standard | proactive (default standard) — how many
#   suggested next steps the assistant offers at turn boundaries.
action_prompting: standard

# detail_level: concise | standard | verbose (default standard) — interview/turn
#   verbosity + follow-up count. NOTE: this is conversational length only; the
#   LENGTH/LANGUAGE of generated reports is governed by harness/data/output.yaml,
#   never by this knob.
detail_level: standard

# --- output_style: audience-adaptation axis (NOT scope-fenced) ------------------
# output_style: off (default) or 0..5 — adapts the DELIVERABLE (prose AND code:
#   comment density, verbosity, examples, analogies) to the reader's coding
#   expertise. 0=absolute beginner (eli5) · 1=junior · 2=mid · 3=senior · 4=lead ·
#   5=expert (god, terse/code-first). UNLIKE the knobs above, this DOES change
#   generated code/output. Full profiles: harness/data/output-styles/. Off = leave
#   the key null / absent (no shaping). Set an integer 0-5 to opt in.
output_style:

